<header class="bg-slate-900 border-b border-slate-800 px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">

        <!-- Left Side: Logo -->
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-amber-300 rounded-lg flex items-center justify-center font-bold text-slate-900">B
            </div>
            <span class="text-2xl font-bold text-amber-300 tracking-tight">Bazaar</span>
        </div>

        <!-- Right Side: Conditional Auth State -->
        <nav class="flex items-center gap-4">

            @if (!isLoggedIn) {
            <!-- State: Logged Out -->
            <button [routerLink]="['login']" class="text-slate-400 hover:text-amber-300 font-medium transition-colors">
                Login
            </button>
            <button [routerLink]="['register']"
                class="px-5 py-2 bg-amber-300 hover:bg-amber-400 text-slate-900 font-bold rounded-full shadow-lg transition-all active:scale-95">
                Join Free
            </button>
            }
            @else {
            <!-- State: Logged In -->
            <a [routerLink]="['products']" routerLinkActive="text-amber-300"
                class="flex items-center gap-2 text-slate-400 hover:text-amber-300 font-medium transition-colors group/link">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 group-hover/link:animate-pulse" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="Storefront"
                        d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                Products
            </a>

            <a [routerLink]="['orders']" routerLinkActive="text-amber-300"
                class="flex items-center gap-2 text-slate-400 hover:text-amber-300 font-medium transition-colors group/link">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 group-hover/link:animate-pulse" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="Storefront"
                        d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                Orders
            </a>

            <!-- Vertical Divider (Optional, looks great for separation) -->
            <div class="h-4 w-[1px] bg-slate-700 hidden sm:block mx-2"></div>

            <!-- Cart Icon Container -->
            <div class="relative group cursor-pointer p-2 rounded-full hover:bg-slate-800 transition-all mr-2"
                [routerLink]="['cart']">
                <!-- Cart SVG -->
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="w-6 h-6 text-slate-400 group-hover:text-amber-300 transition-colors" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>

                <!-- Item Count Badge (Mocked at '3') -->
                <span
                    class="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-amber-400 text-[10px] font-bold text-slate-900 ring-2 ring-slate-900">
                    {{ cartQuantity$ | async }}
                </span>
            </div>

            <div class="flex items-center gap-4 group cursor-pointer">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-amber-300 leading-none">{{ username }}</p>
                    <button (click)="logout()"
                        class="text-[10px] uppercase tracking-widest text-slate-500 hover:text-red-400 transition-colors">
                        Sign Out
                    </button>
                </div>

                <!-- Avatar -->
                <div
                    class="w-10 h-10 rounded-full border-2 border-amber-300/30 p-0.5 group-hover:border-amber-300 transition-all" [routerLink]="['profile']">
                    <img src="https://ui-avatars.com/api/?name={{username}}&background=fcd34d&color=0f172a"
                        alt="Profile" class="w-full h-full rounded-full">
                </div>
            </div>
            }

        </nav>
    </div>
</header>
