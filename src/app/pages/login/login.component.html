<div class="min-h-screen flex items-center justify-center p-6 bg-slate-950">
  <!-- Decorative background glow -->
  <div class="absolute w-64 h-64 bg-amber-500/10 rounded-full blur-3xl"></div>

  <form [formGroup]="loginForm" (ngSubmit)="onLogin()" 
    class="relative w-full max-w-md bg-slate-900/40 backdrop-blur-2xl border border-slate-700/50 p-10 rounded-3xl shadow-2xl z-10">
    
    <!-- Header -->
    <div class="text-center mb-10">
      <h2 class="text-4xl font-bold text-amber-300 tracking-tight">Welcome Back</h2>
      <p class="text-slate-400 mt-2">Enter your credentials to access Bazaar</p>
    </div>

    <div class="space-y-6">
      <!-- Email/Username -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2 ml-1">Username</label>
        <input type="text" placeholder="Enter your username" 
          formControlName="username"
          class="w-full px-5 py-4 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-amber-300/30 focus:border-amber-300 transition-all placeholder:text-slate-600">
      </div>

      <!-- Password -->
      <div>
        <!-- <div class="flex justify-between mb-2 ml-1">
          <label class="text-xs font-semibold uppercase tracking-wider text-slate-500">Password</label>
          <a href="#" class="text-xs text-amber-300/70 hover:text-amber-300 transition-colors">Forgot?</a>
        </div> -->
        <input type="password" placeholder="••••••••" 
          formControlName="password"
          class="w-full px-5 py-4 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-amber-300/30 focus:border-amber-300 transition-all placeholder:text-slate-600">
      </div>

      <!-- Remember Me -->
      <!-- <div class="flex items-center ml-1">
        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-700 bg-slate-800 text-amber-300 focus:ring-amber-300/20">
        <label for="remember" class="ml-2 text-sm text-slate-400">Keep me logged in</label>
      </div> -->

      <!-- Login Button -->
      <button type="submit" 
        [disabled]="loginForm.invalid"
        class="w-full py-4 mt-2 bg-amber-300 hover:bg-amber-400 disabled:opacity-50 disabled:cursor-not-allowed text-slate-900 font-bold rounded-xl shadow-xl shadow-amber-900/20 transition-all active:scale-95">
        Sign In
      </button>
    </div>

    <!-- Register Link -->
    <p class="text-center text-slate-500 mt-8 text-sm">
      New to the bazaar? 
      <a [routerLink]="['..', 'register']" class="text-amber-300 hover:text-amber-400 font-bold transition-colors">Create Account</a>
    </p>
  </form>
</div>
