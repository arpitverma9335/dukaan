<div *ngIf="isOpen" 
     class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm transition-opacity">
  
  <div class="relative bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden transform transition-all scale-100 animate-in zoom-in-95 duration-200">
    
    <!-- Dynamic Top Bar -->
    <div class="h-2" [ngClass]="config.bar"></div>

    <div class="p-8 text-center">
      <!-- Dynamic Icon Circle -->
      <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6" [ngClass]="config.iconBg">
        
        <!-- Error Icon (Triangle) -->
        <svg *ngIf="type === 'ERROR'" class="h-8 w-8" [ngClass]="config.iconColor" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>

        <!-- Info Icon (Circle i) -->
        <svg *ngIf="type === 'INFO'" class="h-8 w-8" [ngClass]="config.iconColor" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>

      <h3 class="text-xl font-bold text-gray-900 mb-2">{{ title }}</h3>
      <p class="text-sm text-gray-500 leading-relaxed">{{ message }}</p>

      <div class="mt-8">
        <!-- Dynamic Button Color -->
        <button (click)="closeModal()"
          class="w-full inline-flex justify-center py-3 px-6 border border-transparent shadow-sm text-sm font-bold rounded-xl text-white transition-all active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2"
          [ngClass]="config.btn">
          Dismiss
        </button>
      </div>
    </div>
  </div>
</div>
